{% extends "base.html" %}
{% block content %}
<h1 class="mb-4 text-3xl font-bold">Announcements</h1>
<section class="grid gap-4">
  {% for announcement in announcements %}
    <article class="card">
      <h2 class="text-xl font-semibold">{{ announcement.title }}</h2>
      <p class="text-sm text-slate-600">{{ announcement.publish_at|date:"M d, Y H:i" }}</p>
      <p class="mt-3 whitespace-pre-wrap">{{ announcement.body }}</p>
    </article>
  {% empty %}<p>No announcements.</p>{% endfor %}
</section>
{% endblock %}
