{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-3xl card">
  <h1 class="mb-2 text-3xl font-bold">{{ quiz.title }}</h1>
  <p class="mb-4 text-slate-600">{{ quiz.description }}</p>
  <form method="post">
    {% csrf_token %}
    {% for question in questions %}
      <fieldset class="mb-5 border-b pb-4">
        <legend class="mb-2 font-semibold">{{ forloop.counter }}. {{ question.prompt }}</legend>
        <label><input class="mr-2 inline w-auto" type="radio" name="question_{{ question.id }}" value="A" required> {{ question.choice_a }}</label>
        <label><input class="mr-2 inline w-auto" type="radio" name="question_{{ question.id }}" value="B"> {{ question.choice_b }}</label>
        <label><input class="mr-2 inline w-auto" type="radio" name="question_{{ question.id }}" value="C"> {{ question.choice_c }}</label>
        <label><input class="mr-2 inline w-auto" type="radio" name="question_{{ question.id }}" value="D"> {{ question.choice_d }}</label>
      </fieldset>
    {% endfor %}
    <button type="submit">Submit quiz</button>
  </form>
</section>
{% endblock %}
