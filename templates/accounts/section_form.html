{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-2xl card elevated">
  <p class="eyebrow">Section setup</p>
  <h1 class="mb-4 text-3xl font-black">{% if section %}Edit{% else %}New{% endif %} Section</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="flex gap-3">
      <button type="submit">Save section</button>
      <a class="btn secondary" href="{% url 'section_manage' %}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
